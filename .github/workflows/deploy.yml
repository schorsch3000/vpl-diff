name: Deploy to GitHub Pages

# Auto-deploy the static site on every push to the default branch.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions required by the Pages deployment action.
# actions: write is needed to delete stale artifacts left behind by re-runs.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Re-running this workflow's job leaves the previous attempt's
      # "github-pages" artifact in place, which makes deploy-pages fail
      # with "Multiple artifacts named github-pages were found". Delete
      # any leftovers for this run before uploading a fresh one.
      - name: Delete stale github-pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id')
          for id in $ids; do
            echo "Deleting stale artifact $id"
            gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done

      # The site is fully static, so upload the repository root as-is.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
